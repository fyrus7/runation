<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Status</title>
  <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">

<style>
  .success-ok-btn {
    display: inline-flex;
    width: 100%;
    max-width: 260px;
    height: 48px;
    margin-top: 18px;
    border-radius: 999px;
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: #fff;
    text-decoration: none;
    align-items: center;
    justify-content: center;
    font-weight: 900;
  }
</style>

</head>
<body>

<div class="container">
  <div id="statusBox">
    <h1>Checking Payment...</h1>
    <p>Please wait.</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const ref = params.get("ref") || params.get("order_id") || "";
  const statusId = params.get("status_id") || "";
  const msg = params.get("msg") || "";
  const transactionId = params.get("transaction_id") || "";
  const billcode = params.get("billcode") || "";

  const box = document.getElementById("statusBox");

  function okButton(eventSlug) {
    const href = eventSlug
      ? `event.html?event=${encodeURIComponent(eventSlug)}`
      : "index.html";

    return `
      <a class="success-ok-btn" href="${href}">
        OK
      </a>
    `;
  }

  async function verifyPayment() {
    try {
      if (!ref || !billcode) {
        throw new Error("Missing registration reference or bill code.");
      }

      const res = await fetch("/api/payment-verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          reg_no: ref,
          billcode: billcode
        })
      });

      const result = await res.json();

      if (!res.ok || !result.success) {
        throw new Error(result.error || "Payment verification failed.");
      }

      const eventSlug = result.event_slug || "";

      if (result.paid) {
        box.innerHTML = `
          <div class="success-box">
            <h1>Payment Successful</h1>
            <p><b>Registration No:</b> ${ref}</p>
            <p><b>Transaction ID:</b> ${result.transaction_id || transactionId || "-"}</p>
            <p><b>Bill Code:</b> ${billcode}</p>
            <p>Your registration has been confirmed.</p>
            ${okButton(eventSlug)}
          </div>
        `;
      } else if (statusId === "1" && msg.toLowerCase() === "ok") {
        box.innerHTML = `
          <div class="success-box">
            <h1>Payment Received</h1>
            <p><b>Registration No:</b> ${ref}</p>
            <p><b>Bill Code:</b> ${billcode}</p>
            <p>Payment was returned as successful, but verification is still pending.</p>
            ${okButton(eventSlug)}
          </div>
        `;
      } else {
        box.innerHTML = `
          <div class="error-box">
            <h1>Payment Pending / Failed</h1>
            <p><b>Registration No:</b> ${ref || "-"}</p>
            <p>Please contact the organizer if payment was deducted.</p>
            ${okButton(eventSlug)}
          </div>
        `;
      }

    } catch (err) {
      box.innerHTML = `
        <div class="error-box">
          <h1>Verification Error</h1>
          <p>${err.message}</p>
          <p><b>Registration No:</b> ${ref || "-"}</p>
          <p><b>Bill Code:</b> ${billcode || "-"}</p>
          ${okButton("")}
        </div>
      `;
    }
  }

  verifyPayment();
</script>

</body>
</html>
