<body>
  <main class="event-page">
    <section class="event-hero">
      <div class="event-badge">RUNATION EVENT</div>
      <h1 id="eventTitle">Loading event...</h1>
      <p id="eventDescription"></p>

      <div class="event-info-row">
        <span id="eventVenue">-</span>
        <span id="eventDate">-</span>
      </div>

      <div id="eventStatus" class="event-status-pill">Loading</div>
    </section>

    <section class="registration-card">
      <h2>Registration</h2>

      <div id="categoryBox">
        <label for="categorySelect">Category</label>
        <select id="categorySelect">
          <option>Loading...</option>
        </select>
      </div>

      <!-- form kau letak bawah ni nanti -->
      <button id="registerBtn" type="button">Register Now</button>

      <div id="eventMessage"></div>
    </section>
  </main>

  <script src="js/event.js"></script>
</body>
