<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUNATION Events</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/landing.css">
</head>

<body class="landing-page">

<header class="hub-header">
  <div class="hub-header-inner">
    <a href="index.html" class="hub-brand">
      <span class="hub-logo">R</span>
      <span>RUNATION</span>
    </a>
  </div>
</header>

<main>
  <section class="hub-hero">
    <div class="hub-hero-inner">
      <p class="hub-kicker">RUNATION EVENT HUB</p>

      <h1>Forget The Pace,<br>Just Run.</h1>

      <p>
        Find running events, register, and get ready for race day.
      </p>
    </div>
  </section>

  <section class="events-section">
    <div class="events-wrap">
      <div class="section-head-left">
        <p>AVAILABLE EVENTS</p>
        <h2>Choose Your Race</h2>
      </div>

      <div id="eventList" class="event-list-grid">
        <div class="event-loading">Loading events...</div>
      </div>
    </div>
  </section>
</main>

<footer class="hub-footer">
  <strong>RUNATION</strong>
  <span>Forget the pace. Just run.</span>
</footer>

<script src="js/index.js"></script>

</body>
</html>
