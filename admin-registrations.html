<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runation Registrations</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #0f172a;
    }

    .admin-header {
      background: #0f172a;
      color: #fff;
      padding: 16px;
    }

    .admin-header-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .admin-header h1 {
      margin: 0;
      font-size: 20px;
    }

    .admin-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 900;
      font-size: 13px;
    }

    .admin-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .admin-card {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid #e6edf6;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }

    .admin-card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
      color: #334155;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #dbe3ea;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 900;
      cursor: pointer;
      background: #0f172a;
      color: #fff;
    }

    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-box {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 16px;
      padding: 14px;
    }

    .summary-box small {
      display: block;
      color: #64748b;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .summary-box strong {
      font-size: 22px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #e6edf6;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .status {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      background: #e2e8f0;
      color: #334155;
      white-space: nowrap;
    }

    .status-paid {
      background: #dcfce7;
      color: #166534;
    }

    .status-pending_payment {
      background: #fef3c7;
      color: #92400e;
    }

    .status-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .muted {
      color: #64748b;
      font-size: 12px;
    }
	
	button.danger {
      background: #ef4444;
	  color: #fff;
	}

    #adminMessage {
      margin-top: 12px;
      font-weight: 800;
      color: #2563eb;
    }

    @media (max-width: 800px) {
      .filter-grid,
      .summary-row {
        grid-template-columns: 1fr;
      }

      .admin-header-inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<header class="admin-header">
  <div class="admin-header-inner">
    <h1>RUNATION Registrations</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <a href="admin.html">Event Admin</a>
      <a href="index.html">View Site</a>
    </div>
  </div>
</header>

<main class="admin-wrap">

  <section class="admin-card">
    <h2>Admin Access</h2>

    <div class="filter-grid">
      <div>
        <label>Admin Token</label>
        <input id="adminToken" type="password" placeholder="Enter admin token">
      </div>

      <div>
        <label>Event</label>
        <select id="eventFilter">
          <option value="">All Events</option>
        </select>
      </div>

      <div>
        <label>Search</label>
        <input id="searchInput" placeholder="Name / IC / Reg No / Phone / Email">
      </div>
    </div>

    <div class="filter-grid" style="margin-top:12px;">
      <div>
        <label>Status</label>
        <select id="statusFilter">
          <option value="">All Status</option>
          <option value="PAID">PAID</option>
          <option value="PENDING_PAYMENT">PENDING_PAYMENT</option>
          <option value="FAILED">FAILED</option>
        </select>
      </div>
    </div>

    <div class="button-row">
      <button onclick="saveToken()">Save Token</button>
	  <button class="secondary" onclick="loadRegistrations()">Refresh</button>
	  <button class="secondary" onclick="exportCsv()">Export CSV</button>
	  <button class="danger" onclick="logoutAdmin()">Logout</button>
    </div>

    <div id="adminMessage"></div>
  </section>

  <section class="admin-card">
    <h2>Summary</h2>

    <div class="summary-row">
      <div class="summary-box">
        <small>Total</small>
        <strong id="sumTotal">0</strong>
      </div>

      <div class="summary-box">
        <small>Paid</small>
        <strong id="sumPaid">0</strong>
      </div>

      <div class="summary-box">
        <small>Pending</small>
        <strong id="sumPending">0</strong>
      </div>

      <div class="summary-box">
        <small>Failed</small>
        <strong id="sumFailed">0</strong>
      </div>
    </div>
  </section>

  <section class="admin-card">
    <h2>Participant List</h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Reg No</th>
            <th>Status</th>
            <th>Name</th>
            <th>IC</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Category</th>
            <th>Event Tee</th>
            <th>Finisher Tee</th>
            <th>Emergency</th>
            <th>Event</th>
            <th>Amount</th>
            <th>Created</th>
            <th>Paid</th>
          </tr>
        </thead>

        <tbody id="registrationRows">
          <tr>
            <td colspan="15">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script src="js/admin-registrations.js"></script>

</body>
</html>
